<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Banner index animation for blog</title>
<style>
:root {
color-scheme: light;
}

*,
*::after,
*::before {
box-sizing: border-box;
}

body {
background: linear-gradient(180deg, #0e223a 0%, #17365c 100%);
color: #e8f3fc;
font-family: Georgia, "Times New Roman", serif;
margin: 0;
min-height: 100vh;
padding: 2rem;
}

main {
margin-inline: auto;
max-width: 110rem;
}

h1,
p {
margin-block: 0 1rem;
}

.banner-shell {
background: radial-gradient(circle at top, rgb(255 255 255 / 10%), transparent 45%), linear-gradient(180deg, rgb(255 255 255 / 6%), rgb(255 255 255 / 2%));
border: 1px solid rgb(232 243 252 / 18%);
border-radius: 1.5rem;
box-shadow: 0 2rem 4rem rgb(0 0 0 / 28%);
overflow: hidden;
padding: 1.5rem;
}

#index-banner {
margin-inline: auto;
max-width: 100rem;
}

#index-banner svg {
display: block;
height: auto;
width: 100%;
}

.error-message {
background: rgb(167 21 29 / 12%);
border: 1px solid rgb(167 21 29 / 45%);
border-radius: .75rem;
color: #fff4f4;
margin-block-start: 1rem;
padding: 1rem;
}
</style>
</head>
<body>
<main>
<h1>Banner index animation</h1>
<p>This standalone page loads the live `banner-index` SVG, the related home-page animation CSS, and the matching banner controller from the project.</p>
<div class="banner-shell">
<div id="index-banner" aria-label="Banner index animation demo"></div>
</div>
</main>

<script>
const loadText = async (path) => {
const response = await fetch(path);

if (!response.ok) {
throw new Error(`Could not load ${path}`);
}

return response.text();
};

const renderIndexBannerDemo = async () => {
const bannerContainer = document.getElementById("index-banner");

if (!bannerContainer) {
return;
}

try {
const [cssText, svgText, scriptsText] = await Promise.all([
loadText("src/css/index.css"),
loadText("src/_includes/partials/banner-index.svg"),
loadText("src/js/scripts.js"),
]);

const style = document.createElement("style");
const scriptStart = 'const indexBanner = document.getElementById("index-banner");';
const scriptEnd = 'const usingBannerSvg = document.getElementById("banner-using-svg");';
const startIndex = scriptsText.indexOf(scriptStart);
const endIndex = scriptsText.indexOf(scriptEnd);

if (startIndex === -1 || endIndex === -1 || endIndex <= startIndex) {
throw new Error("Could not isolate the banner-index controller.");
}

style.textContent = cssText;
document.head.append(style);

bannerContainer.innerHTML = svgText;
new Function(scriptsText.slice(startIndex, endIndex))();
} catch (error) {
const message = document.createElement("p");

message.className = "error-message";
message.textContent = `${error.message} Open this page through a local or deployed web server so the source files can be fetched.`;
bannerContainer.replaceWith(message);
}
};

renderIndexBannerDemo();
</script>
</body>
</html>
