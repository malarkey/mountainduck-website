{% set benefits = collections.benefits or [] %}

{% if benefits.length %}
<div class="layout" data-layout="vienna">
{% for item in benefits %}

{% if loop.index <= 3 %}
<article class="item-benefit">
{% if item.data.image %}
<img src="{{ item.data.image }}" alt="{{ item.data.title }}">
{% endif %}
<h3>{{ item.data.title }}</h3>
<p>{{ item.data.summary }}</p>
</article>
{% endif %}

{% endfor %}
</div>
{% endif %}
