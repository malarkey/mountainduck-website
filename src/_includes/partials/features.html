{% set features = collections.features or [] %}

{% if features.length %}
{% for item in features %}

{% if loop.index <= 4 %}
<article class="item-feature">
{% if item.data.image %}
<img src="{{ item.data.image }}" alt="{{ item.data.title }}">
{% endif %}
<h3>{{ item.data.title }}</h3>
<p>{{ item.data.summary }}</p>
</article>
{% endif %}

{% endfor %}
{% endif %}
